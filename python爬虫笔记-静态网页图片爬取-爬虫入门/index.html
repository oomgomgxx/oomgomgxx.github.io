<br><span class="hljs-comment"># pip install requests</span><br><br><span class="hljs-keyword">import</span> requests<br><br><span class="hljs-comment"># 请求网站（指定爬取目标）</span><br><span class="hljs-comment"># response = requests.get('https://news.163.com')</span><br><span class="hljs-comment"># 获取返回的文本内容</span><br><span class="hljs-comment"># text = response.text</span><br><span class="hljs-comment"># print(text)</span><br><br><br><span class="hljs-comment"># =========== 使用BeautifulSoup获取页面标签 ===========</span><br><span class="hljs-comment"># 安装beautifulsoup4模块：用于解析requests返回的文本内容</span><br><span class="hljs-comment"># pip install beautifulsoup4</span><br><span class="hljs-comment"># 安装lxml解析器</span><br><span class="hljs-comment"># 1.</span><br><span class="hljs-comment">#  http://www.lfd.uci.edu/~gohlke/pythonlibs/#lxml</span><br><span class="hljs-comment">#  下载适合自己python版本的whl文件，如下为我下载的版本</span><br><span class="hljs-comment"># 2. 切换到下载whl文件所在目录安装whl，如下</span><br><span class="hljs-comment"># pip3 install lxml-4.3.3-cp37-cp37m-win_amd64.whl</span><br><br><span class="hljs-keyword">from</span> bs4 <span class="hljs-keyword">import</span> BeautifulSoup<br><br><span class="hljs-comment"># response = requests.get('https://news.163.com')</span><br><span class="hljs-comment"># text = response.text</span><br><br><span class="hljs-comment"># 指定BeautifulSoup使用lxml解析文本内容</span><br><span class="hljs-comment"># soup = BeautifulSoup(text, 'lxml')</span><br><span class="hljs-comment"># 使用find方法查到第一个img标签</span><br><span class="hljs-comment"># find = soup.find('img')</span><br><br><span class="hljs-comment"># 输出返回值类型</span><br><span class="hljs-comment"># print("find的类型：", type(find))</span><br><span class="hljs-comment"># 输出find获取的值</span><br><span class="hljs-comment"># print("整合标签定义：", find)</span><br><span class="hljs-comment"># 输出标签的名字</span><br><span class="hljs-comment"># print("标签名称：", find.name)</span><br><span class="hljs-comment"># 输出标签的_src属性值</span><br><span class="hljs-comment"># print("图片：", find['src'])</span><br><span class="hljs-comment"># 标签体内容</span><br><span class="hljs-comment"># print('标签体内容：', find.string)</span><br><br><br><span class="hljs-comment"># =========== 获取html注释内容 ===========</span><br><span class="hljs-comment"># markup = "&lt;b&gt;&lt;!-- python爬虫学习 --&gt;&lt;/b&gt;&lt;a href='www.bing.com'&gt;&lt;!-- aaa python爬虫学习 --&gt;&lt;/a&gt;"</span><br><span class="hljs-comment"># soup = BeautifulSoup(markup, 'lxml')</span><br><span class="hljs-comment"># print('b注释内容：', soup.b.string)</span><br><span class="hljs-comment"># print('a注释内容：', soup.a.string)</span><br><span class="hljs-comment"># 查找标签string表达式：soup.标签名称.string</span><br><br><br><span class="hljs-comment"># =========== 遍历img标签(强大的find_all方法) ===========</span><br><span class="hljs-comment"># response = requests.get('https://news.163.com')</span><br><span class="hljs-comment"># text = response.text</span><br><span class="hljs-comment"># soup = BeautifulSoup(text, 'lxml')</span><br><span class="hljs-comment">#</span><br><span class="hljs-comment"># #得到所有的&lt;a&gt;标签</span><br><span class="hljs-comment"># find_all = soup.find_all('img')</span><br><span class="hljs-comment"># for img in find_all:</span><br><span class="hljs-comment">#     # print(type(img))</span><br><span class="hljs-comment">#     # &lt;class 'bs4.element.Tag'&gt;</span><br><span class="hljs-comment">#     if img.get('src'):</span><br><span class="hljs-comment">#         print(img.get('src'))</span><br><span class="hljs-comment">#     else:</span><br><span class="hljs-comment">#         print(img.get('data-src'))</span><br><br><br><span class="hljs-comment"># =========== 图片保存相关 ===========</span><br><span class="hljs-keyword">import</span> os<br><br>dirName = <span class="hljs-string">'C:/Users/admin/Desktop/py_save'</span><br><br><span class="hljs-comment"># 创建文件夹</span><br><span class="hljs-function"><span class="hljs-keyword">def</span> <span class="hljs-title">mkdir</span><span class="hljs-params">(path)</span>:</span><br>    path = path.strip()<br>    isExists = os.path.exists(path)<br>    <span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> isExists:<br>        os.makedirs(path)<br>        print(<span class="hljs-string">'文件夹创建成功'</span>)<br>    <span class="hljs-keyword">else</span>:<br>        print(path, <span class="hljs-string">'文件夹已经存在了，不再创建'</span>)<br><br><span class="hljs-comment"># 创建文件夹</span><br>mkdir(dirName)<br><br><span class="hljs-comment"># 保存图片</span><br><span class="hljs-function"><span class="hljs-keyword">def</span> <span class="hljs-title">saveImg</span><span class="hljs-params">(requests, url, dirName, fileName)</span>:</span><br>    img = requests.get(url)<br>    file_name = dirName + <span class="hljs-string">'/'</span> + fileName + <span class="hljs-string">'.png'</span><br>    f = open(file_name, <span class="hljs-string">'ab'</span>)<br>    f.write(img.content)<br>    print(file_name, <span class="hljs-string">'文件保存成功！'</span>)<br>    f.close()<br><br><span class="hljs-comment"># =========== 去除https://unsplash.com/t/wallpapers中图片地址后面的参数 ===========</span><br><br>reqUrl = <span class="hljs-string">'https://unsplash.com/t/wallpapers'</span><br>text = requests.get(reqUrl).text<br>soup = BeautifulSoup(text, <span class="hljs-string">'lxml'</span>)<br><br><span class="hljs-keyword">import</span> uuid<br><br><span class="hljs-comment">#得到所有的&lt;a&gt;标签</span><br>find_all = soup.find_all(<span class="hljs-string">'img'</span>)<br><span class="hljs-keyword">for</span> img <span class="hljs-keyword">in</span> find_all:<br><br>    <span class="hljs-comment"># 文件名称</span><br>    uuid_ = uuid.uuid1()<br><br>    <span class="hljs-keyword">if</span> img.get(<span class="hljs-string">'src'</span>):<br>        <span class="hljs-comment"># 将后面的参数去掉，即?后面的内容</span><br>        url = img.get(<span class="hljs-string">'src'</span>).split(<span class="hljs-string">'?'</span>)[<span class="hljs-number">0</span>]<br>
